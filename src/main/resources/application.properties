# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
spring.application.name=dement-backend

# =============================================
# POSTGRESQL DATABASE CONFIGURATION
# =============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT CONFIGURATION
# =============================================
app.jwt.secret=dement_super_secret_key_2024_very_long_string_for_hs512_algorithm_minimum_512_bits
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# =============================================
# FILE STORAGE CONFIGURATION
# =============================================
app.upload.base-dir=uploads
app.upload.profile-dir=uploads/profiles
app.upload.memory-dir=uploads/memories
app.upload.song-dir=uploads/songs
app.upload.mri-dir=uploads/mri
app.upload.max-size=10485760
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# =============================================
# ML SERVICE CONFIGURATION
# =============================================
#app.ml.service.url=http://localhost:5001
app.ml.service.mri-endpoint=/api/predict/mri
app.ml.service.timeout=30000

# =============================================
# FILE UPLOAD SIZE LIMITS
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# =============================================
# LOGGING
# =============================================
logging.level.com.dement=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG


# =============================================
# SCHEDULER
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# GEMINI
# =============================================
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash


app.ml.service.url=http://localhost:8001
